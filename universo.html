<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O Universo de Camila</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap");

    :root {
      --space-bg: #0b0212;
      --nebula-color: rgba(94, 25, 112, 0.15);
      --star-glow: rgba(235, 209, 176, 0.8);
      --gold-text: #ebd0a4;
      --white-soft: #fbf7f0;
      --glass-bg: rgba(20, 5, 25, 0.6);
      --glass-border: rgba(235, 209, 176, 0.2);
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: var(--space-bg);
      overflow: hidden;
      font-family: "Montserrat", sans-serif;
      color: var(--white-soft);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* --- NEBULOSA SUAVE NO FUNDO --- */
    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 60vw;
      height: 60vh;
      background: radial-gradient(circle, var(--nebula-color) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      animation: floatNebula 20s infinite alternate ease-in-out;
    }

    body::before {
      top: -10vh;
      left: -10vw;
    }

    body::after {
      bottom: -20vh;
      right: -10vw;
      animation-delay: -10s;
    }

    @keyframes floatNebula {
      0% {
        transform: scale(1) translate(0, 0) rotate(0deg);
        opacity: 0.5;
      }

      100% {
        transform: scale(1.1) translate(20px, -20px) rotate(5deg);
        opacity: 0.8;
      }
    }

    /* --- FUNDO DE GALÁXIA --- */
    .galaxy-bg {
      position: absolute;
      top: -5%;
      left: -5%;
      width: 110%;
      height: 110%;
      background-image: url('assets/fundo.png');
      background-size: cover;
      background-position: center;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
      animation: panGalaxy 60s ease-in-out infinite alternate;
    }

    @keyframes panGalaxy {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(1.05) translate(-2%, -2%);
      }
    }

    /* --- LUZ CENTRAL DO CORAÇÃO --- */
    .core-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 45vw;
      height: 45vh;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(150, 70, 180, 0.12) 0%, transparent 65%);
      filter: blur(50px);
      z-index: 5;
      pointer-events: none;
      animation: corePulse 8s infinite alternate ease-in-out;
    }

    @keyframes corePulse {
      0% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(0.9);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    /* --- POEIRA ESTELAR ANIMADA --- */
    .space-dust {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      animation: slowZoom 40s infinite linear alternate;
    }

    @keyframes slowZoom {
      0% {
        transform: scale(1) rotate(0deg);
      }

      100% {
        transform: scale(1.15) rotate(2deg);
      }
    }

    /* --- COMETAS (ESTRELAS CADENTES) --- */
    .comets-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .comet {
      position: absolute;
      width: 120px;
      height: 1.5px;
      background: linear-gradient(90deg, #fff, transparent);
      border-radius: 50% 0 0 50%;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
      opacity: 0;
      animation: cometFall linear infinite;
    }

    .comet::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 12px 2px rgba(235, 209, 176, 0.9);
    }

    @keyframes cometFall {
      0% {
        transform: rotate(315deg) translateX(300px);
        opacity: 0;
      }

      2% {
        opacity: 1;
      }

      15% {
        transform: rotate(315deg) translateX(-1500px);
        opacity: 0;
      }

      100% {
        transform: rotate(315deg) translateX(-1500px);
        opacity: 0;
      }
    }

    .tiny-star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle random infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0.5);
      }

      50% {
        opacity: 0.8;
        transform: scale(1);
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
      }
    }

    /* --- UI SUPERIOR / BOTÃO --- */
    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      pointer-events: none;
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 40px;
      text-decoration: none;
      color: var(--gold-text);
      font-family: "Montserrat", sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 25px;
      border: 1px solid rgba(235, 209, 176, 0.4);
      border-radius: 50px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .back-btn:hover {
      background: rgba(235, 209, 176, 0.1);
      border-color: var(--gold-text);
      transform: translateY(-2px);
    }

    .title-container {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
    }

    .title-container h1 {
      font-family: "Cinzel", serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--gold-text);
      margin: 0;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(235, 209, 176, 0.3);
    }

    .title-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
      color: rgba(235, 209, 176, 0.6);
      font-size: 1.2rem;
    }

    .title-ornament::before,
    .title-ornament::after {
      content: '';
      width: 40px;
      height: 1px;
      background: rgba(235, 209, 176, 0.3);
    }

    .instruction {
      position: absolute;
      bottom: 34px;
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      letter-spacing: 0.8px;
      text-transform: none;
      color: rgba(235, 209, 176, 0.82);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .instruction i {
      animation: none;
      font-size: 0.95rem;
      color: rgba(235, 209, 176, 0.85);
    }

    /* --- SVG LINHAS DA CONSTELAÇÃO --- */
    svg.constellation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    .star-line {
      stroke: rgba(244, 205, 220, 0.75);
      stroke-width: 1.2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(244, 205, 220, 0.28));
      /* A transição stroke-dashoffset será adicionada via JS */
    }

    /* --- ESTRELAS PRINCIPAIS --- */
    #universe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
    }

    .main-star {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.75), 0 0 16px rgba(235, 209, 176, 0.35);
      transition: all 0.4s ease;
    }

    /* Halo sutil em volta da estrela */
    .main-star::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, rgba(235, 209, 176, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
      transition: all 0.4s ease;
      animation: haloPulse 3s infinite alternate;
    }

    @keyframes haloPulse {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0.3;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0.6;
      }
    }

    /* Numeros ao lado das estrelas */
    .star-num {
      position: absolute;
      top: -15px;
      left: 12px;
      font-family: "Playfair Display", serif;
      font-size: 0.65rem;
      font-style: italic;
      color: rgba(235, 209, 176, 0.5);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .main-star:hover {
      transform: translate(-50%, -50%) scale(1.18);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.95), 0 0 24px rgba(235, 209, 176, 0.45);
    }

    .main-star:hover .star-num {
      opacity: 1;
      color: var(--gold-text);
    }

    .main-star.active {
      background: var(--white-soft);
      box-shadow: 0 0 15px #fff, 0 0 35px var(--gold-text), 0 0 60px var(--gold-text);
    }

    .main-star.active::after {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(235, 209, 176, 0.5) 0%, transparent 70%);
      opacity: 0.8;
      animation: none;
    }

    /* Pulso global quando termina */
    .main-star.pulse-all {
      animation: heartbeat 2s infinite;
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 15px #fff, 0 0 35px var(--gold-text);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.3);
        box-shadow: 0 0 25px #fff, 0 0 55px var(--gold-text);
      }
    }

    /* --- POSIÇÕES DO CORAÇÃO (MENOR E GEOMÉTRICO) --- */
    #star-1 {
      left: 50%;
      top: 38%;
    }

    /* Centro em cima (dip) */
    #star-2 {
      left: 55%;
      top: 30%;
    }

    #star-3 {
      left: 62%;
      top: 26%;
    }

    /* Pico direito */
    #star-4 {
      left: 68%;
      top: 32%;
    }

    #star-5 {
      left: 70%;
      top: 40%;
    }

    /* Borda direita */
    #star-6 {
      left: 66%;
      top: 50%;
    }

    #star-7 {
      left: 60%;
      top: 60%;
    }

    #star-8 {
      left: 55%;
      top: 70%;
    }

    #star-9 {
      left: 50%;
      top: 80%;
    }

    /* Ponta de baixo */
    #star-10 {
      left: 45%;
      top: 70%;
    }

    #star-11 {
      left: 40%;
      top: 60%;
    }

    #star-12 {
      left: 34%;
      top: 50%;
    }

    #star-13 {
      left: 30%;
      top: 40%;
    }

    /* Borda esquerda */
    #star-14 {
      left: 32%;
      top: 32%;
    }

    #star-15 {
      left: 38%;
      top: 26%;
    }

    /* Pico esquerdo */
    #star-16 {
      left: 45%;
      top: 30%;
    }

    /* --- MENSAGEM GLASSMORPHISM --- */
    .message-box {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      width: 85%;
      max-width: 420px;
      background: rgba(14, 4, 20, 0.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(235, 209, 176, 0.12);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      border-radius: 16px;
      color: var(--white-soft);
      padding: 18px 22px;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
      z-index: 200;
    }

    .message-box.visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    #msgText {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.7;
      margin: 0;
      color: var(--white-soft);
    }

    .close-btn {
      display: none;
    }

    /* --- REVELAÇÃO FINAL (C & D) --- */
    #final-reveal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 2s cubic-bezier(0.165, 0.84, 0.44, 1);
      z-index: 150;
    }

    #final-reveal.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #final-reveal h2 {
      font-family: "Cinzel", serif;
      font-size: 3.6em;
      font-weight: 400;
      margin: 0;
      color: var(--gold-text);
      text-shadow: 0 0 18px rgba(235, 209, 176, 0.45);
      letter-spacing: 5px;
    }

    #final-reveal span {
      font-family: "Playfair Display", serif;
      font-size: 1rem;
      font-style: italic;
      color: rgba(235, 209, 176, 0.7);
      letter-spacing: 2px;
      display: block;
      margin-top: -10px;
    }

    @media (max-width: 768px) {
      .title-container h1 {
        font-size: 1.5rem;
      }

      .back-btn {
        top: 20px;
        left: 20px;
        padding: 8px 15px;
        font-size: 0.65rem;
      }

      #final-reveal h2 {
        font-size: 3em;
      }

      .instruction {
        bottom: 20px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>
  <!-- Fundo espacial animado -->
  <div class="galaxy-bg"></div>
  <div class="space-dust" id="space-dust"></div>
  <div class="comets-layer" id="comets-layer"></div>
  <div class="core-glow"></div>

  <!-- UI Superior e Inferior -->
  <div class="ui-layer">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>

    <div class="title-container">
      <h1>Cada estrela guarda um motivo especial</h1>
      <div class="title-ornament">✧</div>
    </div>

    <div class="instruction" id="instruction">
      Clique em uma estrela para começar
    </div>
  </div>

  <!-- Container SVG para linhas desenhadas -->
  <svg class="constellation" id="constellation-svg"></svg>

  <!-- Estrelas -->
  <div id="universe">
    <!-- 16 estrelas geradas via HTML -->
  </div>

  <!-- Revelação Final -->
  <div id="final-reveal">
    <h2>C & D</h2>
    <span>escrito nas estrelas</span>
  </div>

  <!-- Caixa de Mensagem -->
  <div class="message-box" id="msgBox">
    <p id="msgText">...</p>
    <button class="close-btn" onclick="closeMsg()">Fechar</button>
  </div>

  <script>
    const messages = {
      1: "O começo de tudo. Você é o centro do meu universo.",
      2: "Sua companhia transforma qualquer dia comum em uma aventura.",
      3: "Admiro a leveza com que você leva a vida e me ensina a sorrir.",
      4: "Seus olhos têm um brilho que ilumina até meus dias mais escuros.",
      5: "Sua força interior é a coisa mais inspiradora que eu conheço.",
      6: "Amo a sua gentileza e como você trata todos ao seu redor.",
      7: "Quando penso no futuro, a única certeza é que quero você nele.",
      8: "Você desperta o melhor de mim, todos os dias, sem esforço.",
      9: "Sua alma é linda, Camila. Tão linda quanto as estrelas.",
      10: "Seu abraço é o meu lugar favorito no mundo inteiro.",
      11: "O som da sua voz é a minha melodia preferida.",
      12: "Cada memória que criamos juntos é um tesouro que guardo.",
      13: "Obrigado por me apoiar e ser minha maior incentivadora.",
      14: "Com você, aprendi o verdadeiro significado de cumplicidade.",
      15: "Sua lealdade e seu amor são os maiores presentes que ganhei.",
      16: "Você é meu universo, meu começo, meio e fim. Te amo.",
    };

    let msgTimeout;

    function showMessage(text) {
      clearTimeout(msgTimeout);
      msgText.innerText = text;
      msgBox.classList.add("visible");

      msgTimeout = setTimeout(() => {
        msgBox.classList.remove("visible");
      }, 2400);
    }

    const universe = document.getElementById("universe");
    const svg = document.getElementById("constellation-svg");
    const msgBox = document.getElementById("msgBox");
    const msgText = document.getElementById("msgText");
    const instruction = document.getElementById("instruction");
    const finalReveal = document.getElementById("final-reveal");

    // Gerar estrelas
    for (let i = 1; i <= 16; i++) {
      const star = document.createElement("div");
      star.className = "main-star";
      star.id = `star-${i}`;
      star.setAttribute("data-id", i);

      const num = document.createElement("span");
      num.className = "star-num";
      num.innerText = i;
      star.appendChild(num);

      universe.appendChild(star);
    }

    const stars = document.querySelectorAll(".main-star");
    let activeStars = new Set();
    let drawnLines = new Set(); // Para controlar quais conexões já foram desenhadas

    // Calcular posição exata (px) da estrela
    function getStarPos(star) {
      const rect = star.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    // Função para desenhar linha SVG com animação progressiva
    function drawLineAnim(id1, id2) {
      const lineId = `${Math.min(id1, id2)}-${Math.max(id1, id2)}`;
      // O caso 1 e 16 formam a linha final fechando o coração
      const isClosingLine = (id1 === 1 && id2 === 16) || (id1 === 16 && id2 === 1);
      const actualLineId = isClosingLine ? "1-16" : lineId;

      if (drawnLines.has(actualLineId)) return;
      drawnLines.add(actualLineId);

      const s1 = document.getElementById(`star-${id1}`);
      const s2 = document.getElementById(`star-${id2}`);
      const pos1 = getStarPos(s1);
      const pos2 = getStarPos(s2);

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', pos1.x);
      line.setAttribute('y1', pos1.y);
      line.setAttribute('x2', pos2.x);
      line.setAttribute('y2', pos2.y);
      line.setAttribute('class', 'star-line');

      // Calcular distância para animação de dash
      const length = Math.sqrt(Math.pow(pos2.x - pos1.x, 2) + Math.pow(pos2.y - pos1.y, 2));
      line.style.strokeDasharray = length;
      line.style.strokeDashoffset = length;
      line.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1)';

      svg.appendChild(line);

      // Trigger reflow para iniciar animação
      line.getBoundingClientRect();
      line.style.strokeDashoffset = '0';
    }

    // Atualizar todas as linhas baseado nas estrelas ativas
    function checkAndDrawLines() {
      for (let i = 1; i <= 16; i++) {
        let next = i === 16 ? 1 : i + 1;
        if (activeStars.has(i) && activeStars.has(next)) {
          drawLineAnim(i, next);
        }
      }
    }

    // Recalcular posições no redimensionamento para SVG não quebrar
    window.addEventListener("resize", () => {
      svg.innerHTML = '';
      const oldLines = new Set(drawnLines);
      drawnLines.clear();

      // Redesenhar sem animação
      oldLines.forEach(lineId => {
        const parts = lineId.split('-');
        const s1 = document.getElementById(`star-${parts[0]}`);
        const s2 = document.getElementById(`star-${parts[1]}`);
        const pos1 = getStarPos(s1);
        const pos2 = getStarPos(s2);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', pos1.x);
        line.setAttribute('y1', pos1.y);
        line.setAttribute('x2', pos2.x);
        line.setAttribute('y2', pos2.y);
        line.setAttribute('class', 'star-line');
        svg.appendChild(line);
        drawnLines.add(lineId);
      });
    });

    // Lidar com clique nas estrelas
    stars.forEach((star) => {
      star.addEventListener("click", () => {
        const id = parseInt(star.getAttribute("data-id"));

        // Esconder instrução inicial
        instruction.style.opacity = '0';

        // Mostrar mensagem romântica
        showMessage(messages[id]);

        if (!star.classList.contains("active")) {
          star.classList.add("active");
          activeStars.add(id);
          checkAndDrawLines();

          // Checar se completou tudo
          if (activeStars.size === 16) {
            setTimeout(() => {
              closeMsg();
              // Fazer todas as estrelas pulsarem
              stars.forEach(s => s.classList.add('pulse-all'));
              // Mostrar "C & D"
              setTimeout(() => {
                finalReveal.classList.add("visible");
              }, 1000);
            }, 2500); // Dá um tempinho para ler a última mensagem
          }
        }
      });
    });

    function closeMsg() {
      msgBox.classList.remove("visible");
    }

    // Criar Poeira Estelar Fundo
    function createSpaceDust() {
      const container = document.getElementById("space-dust");
      for (let i = 0; i < 130; i++) {
        const s = document.createElement("div");
        s.className = "tiny-star";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        const size = Math.random() * 2 + "px";
        s.style.width = size;
        s.style.height = size;
        s.style.animationDuration = Math.random() * 3 + 1.5 + "s";
        s.style.animationDelay = Math.random() * 3 + "s";
        container.appendChild(s);
      }
    }
    createSpaceDust();

    // Criar Cometas (Estrelas Cadentes)
    function createComets() {
      const container = document.getElementById("comets-layer");
      for (let i = 0; i < 8; i++) {
        const comet = document.createElement("div");
        comet.className = "comet";
        comet.style.top = Math.random() * 100 + "vh";
        comet.style.left = Math.random() * 100 + "vw";
        comet.style.animationDuration = Math.random() * 5 + 6 + "s"; // entre 6s e 11s de ciclo
        comet.style.animationDelay = Math.random() * 8 + "s";
        container.appendChild(comet);
      }
    }
    createComets();
  </script>
</body>
